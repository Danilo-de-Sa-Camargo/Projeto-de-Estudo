name: CI - build, test e publish no Artifactory

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: instalar dependencias
        run: pip install -r requirements.txt

      - name: rodar testes
        run: pytest

  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: login no github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build da imagem docker
        run: docker build -t ghcr.io/danilo-de-sa-camargo/api-simples:${{ github.sha }} .

      - name: push da imagem pro registry
        run: docker push ghcr.io/danilo-de-sa-camargo/api-simples:${{ github.sha }}
